<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0505"/>
      <stop offset="100%" style="stop-color:#1a0a1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="200" fill="#7c3aed" fill-opacity="0.06" filter="url(#blur)"/>
  <circle cx="200" cy="350" r="100" fill="#b45309" fill-opacity="0.08" filter="url(#blur)"/>

  <!-- Stars scattered -->
  <g fill="#fbbf24" fill-opacity="0.6">
    <circle cx="80" cy="60" r="1.5"/>
    <circle cx="150" cy="100" r="1"/>
    <circle cx="700" cy="50" r="1.5"/>
    <circle cx="740" cy="130" r="1"/>
    <circle cx="50" cy="250" r="1"/>
    <circle cx="760" cy="300" r="1.5"/>
    <circle cx="120" cy="380" r="1"/>
    <circle cx="680" cy="400" r="1.5"/>
  </g>

  <!-- Castle silhouette (simple) -->
  <g fill="#1a0f2e" stroke="#4c1d95" stroke-width="0.5">
    <rect x="50" y="250" width="20" height="120"/>
    <rect x="40" y="230" width="40" height="25"/>
    <rect x="40" y="218" width="8" height="15"/>
    <rect x="55" y="218" width="8" height="15"/>
    <rect x="72" y="218" width="8" height="15"/>

    <rect x="680" y="250" width="20" height="120"/>
    <rect x="670" y="230" width="40" height="25"/>
    <rect x="670" y="218" width="8" height="15"/>
    <rect x="685" y="218" width="8" height="15"/>
    <rect x="700" y="218" width="8" height="15"/>
  </g>

  <!-- Lightning bolt emblem -->
  <polygon points="400,120 415,158 405,158 420,195 385,152 397,152 383,120" fill="url(#gold)" filter="url(#glow)"/>

  <!-- Title text -->
  <text x="400" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#fbbf24" letter-spacing="2">Harry Potter</text>
  <text x="400" y="272" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c4b5fd" letter-spacing="6">WIZARDING WORLD</text>

  <!-- Tagline -->
  <text x="400" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#78716c" font-style="italic">An immersive fan-made website</text>

  <!-- Tech pills -->
  <rect x="318" y="345" width="52" height="22" rx="11" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1"/>
  <text x="344" y="360" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24">HTML</text>
  <rect x="380" y="345" width="44" height="22" rx="11" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1"/>
  <text x="402" y="360" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24">CSS</text>
  <rect x="434" y="345" width="50" height="22" rx="11" fill="#fbbf24" fill-opacity="0.1" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1"/>
  <text x="459" y="360" text-anchor="middle" font-family="monospace" font-size="10" fill="#fbbf24">Design</text>
</svg>
