<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050b14"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="300" cy="200" r="150" fill="#06b6d4" fill-opacity="0.07" filter="url(#blur)"/>
  <circle cx="550" cy="280" r="120" fill="#8b5cf6" fill-opacity="0.07" filter="url(#blur)"/>

  <!-- Dashboard shell -->
  <rect x="60" y="40" width="680" height="380" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Sidebar -->
  <rect x="60" y="40" width="160" height="380" rx="14" fill="#0d1526"/>
  <rect x="200" y="40" width="20" height="380" fill="#0f172a"/>

  <!-- Sidebar items -->
  <rect x="75" y="70" width="130" height="32" rx="8" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="93" cy="86" r="6" fill="#06b6d4" fill-opacity="0.4"/>
  <text x="107" y="91" font-family="monospace" font-size="11" fill="#06b6d4">Dashboard</text>

  <text x="93" y="130" font-family="monospace" font-size="10" fill="#475569">Tasks</text>
  <text x="93" y="158" font-family="monospace" font-size="10" fill="#475569">Habits</text>
  <text x="93" y="186" font-family="monospace" font-size="10" fill="#475569">Journal</text>
  <text x="93" y="214" font-family="monospace" font-size="10" fill="#475569">Analytics</text>

  <!-- Stat cards -->
  <rect x="225" y="60" width="130" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="240" y="85" font-family="monospace" font-size="10" fill="#64748b">Tasks Done</text>
  <text x="240" y="112" font-family="monospace" font-size="28" font-weight="700" fill="#06b6d4">24</text>

  <rect x="370" y="60" width="130" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="385" y="85" font-family="monospace" font-size="10" fill="#64748b">Habit Streak</text>
  <text x="385" y="112" font-family="monospace" font-size="28" font-weight="700" fill="#f59e0b">12🔥</text>

  <rect x="515" y="60" width="200" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="530" y="85" font-family="monospace" font-size="10" fill="#64748b">Productivity Score</text>
  <text x="530" y="112" font-family="monospace" font-size="28" font-weight="700" fill="#34d399">87%</text>

  <!-- Chart area -->
  <rect x="225" y="160" width="490" height="140" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="240" y="183" font-family="monospace" font-size="11" fill="#94a3b8">Weekly Activity</text>
  <!-- Chart bars -->
  <g fill="#06b6d4" fill-opacity="0.7">
    <rect x="255" y="240" width="30" height="40" rx="3"/>
    <rect x="300" y="220" width="30" height="60" rx="3"/>
    <rect x="345" y="205" width="30" height="75" rx="3"/>
    <rect x="390" y="215" width="30" height="65" rx="3"/>
    <rect x="435" y="195" width="30" height="85" rx="3"/>
    <rect x="480" y="230" width="30" height="50" rx="3"/>
    <rect x="525" y="210" width="30" height="70" rx="3"/>
    <rect x="570" y="200" width="30" height="80" rx="3"/>
    <rect x="615" y="220" width="30" height="60" rx="3"/>
    <rect x="660" y="190" width="30" height="90" rx="3"/>
  </g>

  <!-- Task list -->
  <rect x="225" y="320" width="490" height="85" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="240" y="342" font-family="monospace" font-size="11" fill="#94a3b8">Today's Tasks</text>
  <circle cx="248" cy="362" r="5" fill="#34d399"/>
  <text x="262" y="366" font-family="monospace" font-size="10" fill="#cbd5e1">Complete DSA practice</text>
  <circle cx="248" cy="381" r="5" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="262" y="385" font-family="monospace" font-size="10" fill="#64748b">Review spring boot modules</text>
  <circle cx="248" cy="397" r="5" fill="none" stroke="#475569" stroke-width="1.5"/>
  <text x="262" y="401" font-family="monospace" font-size="10" fill="#64748b">Push portfolio updates</text>
</svg>
