<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a0f00"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Glow orb -->
  <circle cx="400" cy="225" r="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#f59e0b" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="133" y1="0" x2="133" y2="450"/>
    <line x1="266" y1="0" x2="266" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="534" y1="0" x2="534" y2="450"/>
    <line x1="667" y1="0" x2="667" y2="450"/>
  </g>

  <!-- Logo mark — hexagon -->
  <g transform="translate(370, 130)">
    <polygon points="30,0 60,17 60,52 30,69 0,52 0,17" fill="none" stroke="url(#amber)" stroke-width="2.5"/>
    <polygon points="30,12 48,22 48,47 30,57 12,47 12,22" fill="#f59e0b" fill-opacity="0.15"/>
    <text x="30" y="42" text-anchor="middle" font-family="monospace" font-size="22" font-weight="900" fill="#f59e0b">M</text>
  </g>

  <!-- Brand name -->
  <text x="400" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="900" letter-spacing="12" fill="#ffffff">MOTIF</text>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" letter-spacing="4" fill="#f59e0b" font-weight="500">AI STARTUP PLATFORM</text>

  <!-- Tech pills -->
  <g transform="translate(0, 300)">
    <rect x="180" y="0" width="90" height="24" rx="12" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="225" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#f59e0b">Spring Boot</text>

    <rect x="282" y="0" width="68" height="24" rx="12" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="316" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#f59e0b">OpenAI</text>

    <rect x="362" y="0" width="56" height="24" rx="12" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="390" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#f59e0b">React</text>

    <rect x="430" y="0" width="72" height="24" rx="12" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="466" y="16" text-anchor="middle" font-family="monospace" font-size="11" fill="#f59e0b">PostgreSQL</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="100" cy="80" r="3" fill="#f59e0b" fill-opacity="0.4"/>
  <circle cx="140" cy="120" r="2" fill="#f59e0b" fill-opacity="0.25"/>
  <circle cx="700" cy="360" r="3" fill="#f59e0b" fill-opacity="0.4"/>
  <circle cx="660" cy="320" r="2" fill="#f59e0b" fill-opacity="0.25"/>
</svg>
