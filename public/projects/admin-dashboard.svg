  <text x="122" y="62" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Panel</text>
  <circle cx="710" cy="56" r="12" fill="#374151"/>
  <text x="710" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">AG</text>

