<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#000d1a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="180" fill="#3b82f6" fill-opacity="0.08" filter="url(#blur)"/>

  <!-- Browser frame mockup -->
  <rect x="120" y="70" width="560" height="320" rx="12" fill="#111827" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>
  <!-- Browser bar -->
  <rect x="120" y="70" width="560" height="36" rx="12" fill="#1f2937"/>
  <rect x="120" y="94" width="560" height="12" fill="#1f2937"/>
  <!-- Traffic lights -->
  <circle cx="148" cy="88" r="6" fill="#ef4444" fill-opacity="0.7"/>
  <circle cx="168" cy="88" r="6" fill="#f59e0b" fill-opacity="0.7"/>
  <circle cx="188" cy="88" r="6" fill="#22c55e" fill-opacity="0.7"/>
  <!-- URL bar -->
  <rect x="210" y="79" width="280" height="18" rx="9" fill="#374151"/>
  <text x="350" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="#9ca3af">awaneesh.dev</text>

  <!-- Content area - nav -->
  <rect x="130" y="115" width="540" height="35" fill="#0f172a"/>
  <text x="155" y="137" font-family="monospace" font-size="11" font-weight="700" fill="#f59e0b">Awaneesh</text>
  <text x="215" y="137" font-family="monospace" font-size="11" fill="#f59e0b">.dev</text>
  <text x="480" y="137" font-family="monospace" font-size="10" fill="#94a3b8">About</text>
  <text x="520" y="137" font-family="monospace" font-size="10" fill="#94a3b8">Projects</text>
  <text x="568" y="137" font-family="monospace" font-size="10" fill="#94a3b8">Contact</text>

  <!-- Hero text in mockup -->
  <text x="155" y="185" font-family="system-ui, sans-serif" font-size="22" font-weight="900" fill="#ffffff">Full Stack Developer</text>
  <text x="155" y="205" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Building at the edge of AI &amp; software engineering</text>

  <!-- CTA button -->
  <rect x="155" y="218" width="90" height="24" rx="6" fill="#f59e0b"/>
  <text x="200" y="234" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#000000">View Projects</text>

  <!-- Project cards in mockup -->
  <rect x="155" y="260" width="155" height="110" rx="8" fill="#1e293b" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <rect x="323" y="260" width="155" height="110" rx="8" fill="#1e293b" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <rect x="491" y="260" width="155" height="110" rx="8" fill="#1e293b" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <rect x="155" y="260" width="155" height="45" rx="8" fill="#f59e0b" fill-opacity="0.08"/>
  <rect x="323" y="260" width="155" height="45" rx="8" fill="#3b82f6" fill-opacity="0.08"/>
  <rect x="491" y="260" width="155" height="45" rx="8" fill="#34d399" fill-opacity="0.08"/>
  <text x="232" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#f59e0b">MOTIF</text>
  <text x="400" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#60a5fa">Portfolio</text>
  <text x="568" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#34d399">Dashboard</text>

  <!-- Tech label -->
  <text x="400" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b" letter-spacing="3">React · TypeScript · Tailwind · Supabase</text>
</svg>
