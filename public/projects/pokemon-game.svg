<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a0c"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="180" fill="#ef4444" fill-opacity="0.06" filter="url(#blur)"/>

  <!-- Terminal window -->
  <rect x="100" y="50" width="600" height="360" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <rect x="100" y="50" width="600" height="38" rx="12" fill="#161b22"/>
  <rect x="100" y="75" width="600" height="13" fill="#161b22"/>
  <circle cx="126" cy="69" r="7" fill="#ef4444" fill-opacity="0.7"/>
  <circle cx="150" cy="69" r="7" fill="#f59e0b" fill-opacity="0.7"/>
  <circle cx="174" cy="69" r="7" fill="#22c55e" fill-opacity="0.7"/>
  <text x="400" y="74" text-anchor="middle" font-family="monospace" font-size="12" fill="#6e7681">pokemon_battle.py</text>

  <!-- Terminal content -->
  <text x="125" y="115" font-family="monospace" font-size="13" fill="#22c55e">$ python pokemon_battle.py</text>
  <text x="125" y="140" font-family="monospace" font-size="12" fill="#f59e0b">  ____       __                                  </text>
  <text x="125" y="158" font-family="monospace" font-size="12" fill="#f59e0b"> |  _ \ ___ | | _____ _ __ ___   ___  _ __      </text>
  <text x="125" y="176" font-family="monospace" font-size="12" fill="#f59e0b"> | |_) / _ \| |/ / _ \ '_ ` _ \ / _ \| '_ \    </text>
  <text x="125" y="194" font-family="monospace" font-size="12" fill="#ef4444"> |  __/ (_) |   &lt;  __/ | | | | | (_) | | | |   </text>
  <text x="125" y="212" font-family="monospace" font-size="12" fill="#ef4444"> |_|   \___/|_|\_\___|_| |_| |_|\___/|_| |_|    </text>

  <text x="125" y="245" font-family="monospace" font-size="12" fill="#58a6ff">Choose your starter: [1] Charmander [2] Squirtle [3] Bulbasaur</text>
  <text x="125" y="265" font-family="monospace" font-size="12" fill="#c9d1d9">&gt; 1</text>
  <text x="125" y="285" font-family="monospace" font-size="12" fill="#22c55e">You chose Charmander! (HP: 100, ATK: 52, DEF: 43)</text>

  <text x="125" y="315" font-family="monospace" font-size="12" fill="#f59e0b">Wild Squirtle appeared! (HP: 100)</text>
  <text x="125" y="335" font-family="monospace" font-size="12" fill="#c9d1d9">Charmander used EMBER — deals 18 damage!</text>
  <text x="125" y="355" font-family="monospace" font-size="12" fill="#6e7681">Squirtle HP: 82/100</text>
  <text x="125" y="375" font-family="monospace" font-size="12" fill="#58a6ff">[1] Attack  [2] Special  [3] Run</text>

  <!-- Cursor -->
  <rect x="125" y="393" width="8" height="14" fill="#c9d1d9" fill-opacity="0.7">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
